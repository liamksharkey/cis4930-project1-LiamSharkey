{% block content %}
<!-- myapp/templates/myapp/games_analytics.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Games Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Games Analytics</h2>

<h3>Accessibility vs Rating</h3>
<canvas id="scatterChart"></canvas>

<script>
    const scatterData = {{ scatter_data|safe }};

    new Chart(document.getElementById('scatterChart'), {
        type: 'scatter',
        data: {
            datasets: [{
                label: 'Accessibility vs Rating',
                data: scatterData,
                backgroundColor: 'rgba(75,192,192,1)'
            }]
        },
        options: {
            scales: {
                x: { title: { display: true, text: 'Accessibility Score' } },
                y: { title: { display: true, text: 'Rating' } }
            }
        }
    });
</script>

<h3>Genre Popularity</h3>
<canvas id="genreChart"></canvas>

<script>
    const genres = {{ genres|safe }};
    const genreValues = {{ genre_values|safe }}; 

    new Chart(document.getElementById('genreChart'), {
        type: 'bar',
        data: {
            labels: genres,
            datasets: [{
                label: 'Median Positive Rating',
                data: genreValues,
                backgroundColor: 'rgba(153,102,255,0.6)'
            }]
        },
        options: {
            scales: {
                y: {
                    beginAtZero: true,
                    title: { display: true, text: 'Rating (%)' }
                }
            }
        }
    });
</script>

</body>
</html>
{% endblock content %}
