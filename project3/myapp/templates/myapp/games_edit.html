{% extends 'myapp/base.html' %}
{% block content %}
    <h2>Edit Game - {{ game.name }}</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Save Changes</button>
    </form>

    <br>
    <a href="{% url 'games_detail' game.pk %}">Cancel and go back to Game Detail</a>
{% endblock content %}
